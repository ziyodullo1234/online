    <style>
      /* Minimal kritik CSS (Critical CSS) */
      html, body { 
        height: 100%; 
        margin: 0; 
        padding: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      #root { 
        height: 100%; 
        display: flex;
        flex-direction: column;
      }
      
      /* Yuklanish vaqtidagi loading animatsiyasi */
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #0A0F1E;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      .loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loading-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(37, 99, 235, 0.1);
        border-top-color: #2563EB;
        border-radius: 50%;
        animation: spin 0.8s ease-in-out infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>

  <body>
    <!-- ====== LOADING SCREEN ====== -->
    <div id="loading" class="loading-screen">
      <div class="loading-spinner"></div>
    </div>

    <!-- ====== REACT ROOT ====== -->
    <div id="root"></div>

    <!-- ====== YUKLASHNI TEZLASHTIRISH ====== -->
    <script>
      // Loading ekranini yashirish
      window.addEventListener('load', function() {
        setTimeout(function() {
          document.getElementById('loading').classList.add('hidden');
        }, 500);
      });

      // Yuklab olish vaqtini o'lchash
      if (window.performance) {
        console.log('Page load time:', window.performance.now(), 'ms');
      }
    </script>
